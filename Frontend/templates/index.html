<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AI Missing Person Finder</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body style="background-image: url('/static/image.jpg'); background-size: cover; background-position: center;">
  <div class="content-wrapper">

    <div class="container">
      <!-- <h1>Find Missing Person</h1> -->
      <h1 id="wavy">
        <span>F</span><span>i</span><span>n</span><span>d</span>
        <span>&nbsp;</span>
        <span>M</span><span>i</span><span>s</span><span>s</span><span>i</span><span>n</span><span>g</span>
        <span>&nbsp;</span>
        <span>P</span><span>e</span><span>r</span><span>s</span><span>o</span><span>n</span>
      </h1>

      <div class="tabs">
        <button class="tab-btn active" id="tabBiometric">👤 Biometric & AI</button>
        <button class="tab-btn" id="tabSemantic">🔎 Semantic Search</button>
      </div>

      <!-- Biometric & AI Tab -->
      <div id="biometricTab" class="tab-content active">
        <form id="uploadForm" enctype="multipart/form-data">
          <input type="file" name="image" id="imageInput" required />
          <div class="button-group">
            <button type="submit" id="matchBtn">🔍 Face Match Only</button>
            <button type="button" id="analyzeBtn">🤖 AI Analysis Only</button>
            <button type="button" id="comprehensiveBtn">⚡ Comprehensive Analysis</button>
          </div>
        </form>
      </div>

      <!-- Semantic Search Tab -->
      <div id="semanticTab" class="tab-content">
        <h3 style="color: #fff; margin-bottom: 15px; font-size: 15px; text-align: left;">Search by Text Description:</h3>
        <div class="search-input-group">
          <input type="text" id="textSearchInput" placeholder="e.g., person wearing a red shirt and black backpack" />
          <button type="button" id="textSearchBtn">🔍 Search</button>
        </div>

        <div class="search-divider"></div>

        <h3 style="color: #fff; margin-bottom: 15px; font-size: 15px; text-align: left;">Search by Visual Appearance (Image):</h3>
        <form id="semanticUploadForm" enctype="multipart/form-data">
          <input type="file" name="image" id="semanticImageInput" required />
          <button type="button" id="imageSearchBtn" style="width: 100%; background-color: #00b894; margin-top: 10px;">👕 Search Appearance</button>
        </form>
      </div>
      
      <div id="result"></div>
    </div>

    <!-- Webcam section placed outside the container panel -->
    <div class="webcam-section" id="webcamSection">
      <h2>Or Use Your Camera</h2>
      <video id="video" width="100%" autoplay></video>
      <div class="webcam-buttons">
        <button id="captureBtn">📸 Capture & Face Match</button>
        <button id="captureAnalyzeBtn">🤖 Capture & AI Analyze</button>
        <button id="captureComprehensiveBtn">⚡ Capture & Full Analysis</button>
      </div>
      <canvas id="canvas" style="display:none;"></canvas>
    </div>
    
    <footer class="footer">
      <h3>Team Members</h3>
      <ul>
        <li>Krishna Goyal</li>
        <li>Achintya Srivastava</li>
        <li>Mukund Maheshwari</li>
        <li>Antra Agrawal</li>
      </ul>
      <p>AI-Powered Surveillance | Hackathon 2025</p>
    </footer>
  </div>
  

  <script>
    const form = document.getElementById('uploadForm');
    const resultDiv = document.getElementById('result');
    const matchBtn = document.getElementById('matchBtn');
    const analyzeBtn = document.getElementById('analyzeBtn');
    const comprehensiveBtn = document.getElementById('comprehensiveBtn');

    // Tab switching
    const tabBiometric = document.getElementById('tabBiometric');
    const tabSemantic = document.getElementById('tabSemantic');
    const biometricTab = document.getElementById('biometricTab');
    const semanticTab = document.getElementById('semanticTab');
    const webcamSection = document.getElementById('webcamSection');

    tabBiometric.addEventListener('click', () => {
      tabBiometric.classList.add('active');
      tabSemantic.classList.remove('active');
      biometricTab.classList.add('active');
      semanticTab.classList.remove('active');
      webcamSection.style.display = 'block';
      resultDiv.innerHTML = '';
    });

    tabSemantic.addEventListener('click', () => {
      tabSemantic.classList.add('active');
      tabBiometric.classList.remove('active');
      semanticTab.classList.add('active');
      biometricTab.classList.remove('active');
      webcamSection.style.display = 'none';
      resultDiv.innerHTML = '';
    });

    // Semantic Text Search
    const textSearchInput = document.getElementById('textSearchInput');
    const textSearchBtn = document.getElementById('textSearchBtn');

    textSearchBtn.addEventListener('click', async () => {
      const query = textSearchInput.value.trim();
      if (!query) {
        resultDiv.innerHTML = `<p class="error">⚠️ Please enter a search description first</p>`;
        return;
      }
      await performSemanticSearch({ query });
    });

    // Semantic Image Search
    const semanticImageInput = document.getElementById('semanticImageInput');
    const imageSearchBtn = document.getElementById('imageSearchBtn');
    const semanticUploadForm = document.getElementById('semanticUploadForm');

    imageSearchBtn.addEventListener('click', async () => {
      if (!semanticImageInput.files || semanticImageInput.files.length === 0) {
        resultDiv.innerHTML = `<p class="error">⚠️ Please select a search image first</p>`;
        return;
      }
      const formData = new FormData(semanticUploadForm);
      await performSemanticSearch(formData, true);
    });

    async function performSemanticSearch(payload, isMultipart = false) {
      resultDiv.innerHTML = `<p class="loading">🔄 Semantic Search in progress...</p>`;
      
      try {
        let response;
        if (isMultipart) {
          response = await fetch('/search', {
            method: 'POST',
            body: payload
          });
        } else {
          response = await fetch('/search', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json'
            },
            body: JSON.stringify(payload)
          });
        }

        let data;
        try {
          data = await response.json();
        } catch (jsonError) {
          resultDiv.innerHTML = `<p class="error">⚠️ Invalid response from server. Please try again.</p>`;
          return;
        }

        if (data.error) {
          resultDiv.innerHTML = `<p class="error">⚠️ Error: ${data.error}</p>`;
          return;
        }

        if (data.status === 'success' && data.results) {
          let resultsHTML = `
            <div class="analysis-result">
              <h3>🔎 Semantic Search Results</h3>
              <p style="color: #ccc; font-size: 13px; margin-bottom: 15px; line-height: 1.4;">
                <strong>Query analyzed:</strong> <em>"${data.search_query}"</em>
              </p>
          `;

          if (data.results.length === 0) {
            resultsHTML += `<p style="color: #ccc; text-align: center;">No reference images matched this description.</p>`;
          } else {
            resultsHTML += '<div style="max-height: 400px; overflow-y: auto;">';
            
            data.results.forEach((match) => {
              // Determine match badge color
              let badgeClass = 'match-low';
              if (match.score >= 70) {
                badgeClass = 'match-high';
              } else if (match.score >= 40) {
                badgeClass = 'match-med';
              }

              resultsHTML += `
                <div class="semantic-result-card" style="border-left-color: ${match.score >= 70 ? '#4cd137' : match.score >= 40 ? '#ffa726' : '#e74c3c'};">
                  <div class="semantic-result-header">
                    <span class="semantic-image-name">${match.image}</span>
                    <span class="match-badge ${badgeClass}">${match.score}% Match</span>
                  </div>
                  <p class="semantic-reason">${match.reason}</p>
                </div>
              `;
            });

            resultsHTML += '</div>';
          }

          resultsHTML += '</div>';
          resultDiv.innerHTML = resultsHTML;
        } else {
          resultDiv.innerHTML = `<p class="error">⚠️ Search failed. Please try again.</p>`;
        }
      } catch (error) {
        resultDiv.innerHTML = `<p class="error">⚠️ Network Error: ${error.message}</p>`;
      }
    }

    // Face match only
    matchBtn.addEventListener('click', async (e) => {
      e.preventDefault();
      await performAnalysis('/match', 'Face Matching');
    });

    // AI analysis only
    analyzeBtn.addEventListener('click', async (e) => {
      e.preventDefault();
      await performAnalysis('/analyze', 'AI Analysis');
    });

    // Comprehensive analysis
    comprehensiveBtn.addEventListener('click', async (e) => {
      e.preventDefault();
      await performAnalysis('/comprehensive', 'Comprehensive Analysis');
    });

    async function performAnalysis(endpoint, analysisType) {
      const fileInput = document.getElementById('imageInput');
      if (!fileInput.files || fileInput.files.length === 0) {
        resultDiv.innerHTML = `<p class="error">⚠️ Please select an image first</p>`;
        return;
      }

      const formData = new FormData(form);
      resultDiv.innerHTML = `<p class="loading">🔄 ${analysisType} in progress...</p>`;

      try {
        const response = await fetch(endpoint, {
          method: 'POST',
          body: formData
        });

        let data;
        try {
          data = await response.json();
        } catch (jsonError) {
          resultDiv.innerHTML = `<p class="error">⚠️ Invalid response from server. Please try again.</p>`;
          return;
        }

        if (endpoint === '/match') {
          if (data.error) {
            resultDiv.innerHTML = `<p class="error">⚠️ Error: ${data.error}</p>`;
          } else if (data.all_comparisons && data.all_comparisons.length > 0) {
            // Display all comparison results
            const totalCompared = data.total_compared || data.all_comparisons.length;
            const matchesFound = data.all_comparisons.filter(c => c.match_found).length;
            
            let resultsHTML = `
              <div class="analysis-result">
                <h3>🔍 Face Matching Results</h3>
                <p style="color: #ccc; font-size: 14px; margin-bottom: 15px;">
                  Compared against ${totalCompared} image(s) | 
                  ${matchesFound > 0 ? `<span style="color: #4cd137;">${matchesFound} match(es) found</span>` : '<span style="color: #e74c3c;">No matches</span>'}
                </p>
            `;
            
            if (data.best_match && data.best_match.match_found) {
              resultsHTML += `
                <div style="background: rgba(76, 209, 55, 0.1); padding: 12px; border-radius: 8px; margin-bottom: 15px; border-left: 4px solid #4cd137;">
                  <p style="color: #4cd137; font-weight: bold; margin-bottom: 5px;">✅ Best Match Found!</p>
                  <p style="color: #ccc; font-size: 13px;">Image: <strong>${data.best_match.image}</strong></p>
                  <p style="color: #ccc; font-size: 13px;">Confidence: <strong>${data.best_match.confidence}%</strong> | Distance: ${data.best_match.distance}</p>
                </div>
              `;
            }
            
            resultsHTML += '<div style="max-height: 400px; overflow-y: auto;"><h4 style="color: #f2f2f2; font-size: 14px; margin-bottom: 10px;">All Comparisons:</h4>';
            
            data.all_comparisons.forEach((comp, index) => {
              const matchClass = comp.match_found ? 'success' : 'error';
              const matchIcon = comp.match_found ? '✅' : '❌';
              const matchColor = comp.match_found ? '#4cd137' : '#e74c3c';
              
              resultsHTML += `
                <div style="background: rgba(255, 255, 255, 0.05); padding: 10px; border-radius: 6px; margin-bottom: 8px; border-left: 3px solid ${matchColor};">
                  <p style="color: ${matchColor}; font-size: 13px; margin-bottom: 5px;">
                    ${matchIcon} ${comp.match_found ? 'Match' : 'No Match'} - ${comp.image}
                  </p>
                  <p style="color: #ccc; font-size: 12px; margin: 0;">
                    Distance: ${comp.distance !== null ? comp.distance : 'N/A'} | 
                    Confidence: ${comp.confidence}%
                    ${comp.error ? `<br><span style="color: #ffa726;">Error: ${comp.error}</span>` : ''}
                  </p>
                </div>
              `;
            });
            
            resultsHTML += '</div></div>';
            resultDiv.innerHTML = resultsHTML;
          } else {
            resultDiv.innerHTML = `<p class="error">⚠️ No comparison results available</p>`;
          }
        } else if (endpoint === '/analyze') {
          if (data.status === 'success' && data.analysis) {
            resultDiv.innerHTML = `
              <div class="analysis-result">
                <h3>🤖 AI Analysis Results</h3>
                <div class="analysis-content">${data.analysis.replace(/\n/g, '<br>')}</div>
              </div>
            `;
          } else if (data.error) {
            resultDiv.innerHTML = `<p class="error">⚠️ Error: ${data.error}</p>`;
          } else {
            resultDiv.innerHTML = `<p class="error">⚠️ Analysis failed. Please try again.</p>`;
          }
        } else if (endpoint === '/comprehensive') {
          if (data.status === 'success') {
            let faceMatchHTML = '';
            
            if (data.all_comparisons && data.all_comparisons.length > 0) {
              const matchesFound = data.all_comparisons.filter(c => c.match_found).length;
              const totalCompared = data.total_compared || data.all_comparisons.length;
              
              faceMatchHTML = `
                <h4>Face Matching (${totalCompared} images compared):</h4>
                <p style="color: ${data.face_match ? '#4cd137' : '#e74c3c'};">
                  ${data.face_match ? '✅ Match Found' : '❌ No Match'} 
                  ${matchesFound > 0 ? `(${matchesFound} match${matchesFound > 1 ? 'es' : ''} found)` : ''}
                </p>
              `;
              
              if (data.best_match && data.best_match.match_found) {
                faceMatchHTML += `
                  <div style="background: rgba(76, 209, 55, 0.1); padding: 10px; border-radius: 6px; margin-top: 10px; border-left: 3px solid #4cd137;">
                    <p style="color: #4cd137; font-size: 13px; margin-bottom: 5px;"><strong>Best Match:</strong> ${data.best_match.image}</p>
                    <p style="color: #ccc; font-size: 12px;">Confidence: ${data.best_match.confidence}% | Distance: ${data.best_match.distance}</p>
                  </div>
                `;
              }
              
              if (data.all_comparisons.length > 0) {
                faceMatchHTML += '<div style="max-height: 200px; overflow-y: auto; margin-top: 10px;"><p style="color: #ccc; font-size: 12px; margin-bottom: 5px;">All comparisons:</p>';
                data.all_comparisons.slice(0, 5).forEach(comp => {
                  const matchColor = comp.match_found ? '#4cd137' : '#e74c3c';
                  faceMatchHTML += `
                    <p style="color: ${matchColor}; font-size: 11px; margin: 3px 0;">
                      ${comp.match_found ? '✅' : '❌'} ${comp.image}: ${comp.confidence}% (${comp.distance || 'N/A'})
                    </p>
                  `;
                });
                if (data.all_comparisons.length > 5) {
                  faceMatchHTML += `<p style="color: #ccc; font-size: 11px;">... and ${data.all_comparisons.length - 5} more</p>`;
                }
                faceMatchHTML += '</div>';
              }
            } else {
              const faceMatchStatus = data.face_match === true ? 
                '<span class="success">✅ Match Found</span>' : 
                '<span class="error">❌ No Match</span>';
              
              const faceMatchError = data.face_match_error ? 
                `<p style="color: #ffa726; font-size: 12px; margin-top: 5px;">Note: ${data.face_match_error}</p>` : '';
              
              const confidenceInfo = data.face_match_confidence !== undefined ? 
                `<p style="color: #4cd137; font-size: 12px; margin-top: 5px;">Confidence: ${data.face_match_confidence}% (Distance: ${data.face_match_distance})</p>` : '';
              
              faceMatchHTML = `
                <h4>Face Matching:</h4>
                <p>${faceMatchStatus}</p>
                ${confidenceInfo}
                ${faceMatchError}
              `;
            }
            
            const aiAnalysis = data.ai_analysis ? 
              `<div class="analysis-content">${data.ai_analysis.replace(/\n/g, '<br>')}</div>` :
              '<div class="analysis-content">AI analysis unavailable</div>';
            
            resultDiv.innerHTML = `
              <div class="comprehensive-result">
                <h3>⚡ Comprehensive Analysis Results</h3>
                <div class="face-match-result">
                  ${faceMatchHTML}
                </div>
                <div class="ai-analysis-result">
                  <h4>AI Analysis:</h4>
                  ${aiAnalysis}
                </div>
              </div>
            `;
          } else if (data.error) {
            resultDiv.innerHTML = `<p class="error">⚠️ Error: ${data.error}</p>`;
          } else {
            resultDiv.innerHTML = `<p class="error">⚠️ Analysis failed. Please try again.</p>`;
          }
        }
      } catch (error) {
        resultDiv.innerHTML = `<p class="error">⚠️ Network Error: ${error.message}</p>`;
      }
    }
  </script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const video = document.getElementById('video');
      const canvas = document.getElementById('canvas');
      const captureBtn = document.getElementById('captureBtn');
      const captureAnalyzeBtn = document.getElementById('captureAnalyzeBtn');
      const captureComprehensiveBtn = document.getElementById('captureComprehensiveBtn');
      const resultDiv = document.getElementById('result');
    
      if (!video || !canvas || !captureBtn || !resultDiv) {
        console.error("Missing one or more required DOM elements.");
        return;
      }
    
      // Access webcam
      navigator.mediaDevices.getUserMedia({ video: true })
        .then(stream => {
          video.srcObject = stream;
        })
        .catch(err => {
          console.error("Camera access denied:", err);
        });
    
      // Face match capture
      captureBtn.addEventListener('click', async () => {
        await captureAndAnalyze('/match', 'Face Matching');
      });

      // AI analysis capture
      captureAnalyzeBtn.addEventListener('click', async () => {
        await captureAndAnalyze('/analyze', 'AI Analysis');
      });

      // Comprehensive analysis capture
      captureComprehensiveBtn.addEventListener('click', async () => {
        await captureAndAnalyze('/comprehensive', 'Comprehensive Analysis');
      });

      async function captureAndAnalyze(endpoint, analysisType) {
        if (!video.videoWidth || !video.videoHeight) {
          resultDiv.innerHTML = `<p class="error">⚠️ Please wait for camera to initialize</p>`;
          return;
        }

        // Draw the video frame to canvas
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(video, 0, 0);
    
        // Convert canvas to Blob
        canvas.toBlob(async (blob) => {
          if (!blob) {
            resultDiv.innerHTML = `<p class="error">⚠️ Failed to capture image</p>`;
            return;
          }

          const formData = new FormData();
          formData.append('image', blob, 'capture.jpg');
          resultDiv.innerHTML = `<p class="loading">🔄 ${analysisType} in progress...</p>`;
    
          try {
            const response = await fetch(endpoint, {
              method: 'POST',
              body: formData
            });
    
            let data;
            try {
              data = await response.json();
            } catch (jsonError) {
              resultDiv.innerHTML = `<p class="error">⚠️ Invalid response from server. Please try again.</p>`;
              return;
            }
    
            if (endpoint === '/match') {
              if (data.error) {
                resultDiv.innerHTML = `<p class="error">⚠️ Error: ${data.error}</p>`;
              } else if (data.all_comparisons && data.all_comparisons.length > 0) {
                // Display all comparison results
                const totalCompared = data.total_compared || data.all_comparisons.length;
                const matchesFound = data.all_comparisons.filter(c => c.match_found).length;
                
                let resultsHTML = `
                  <div class="analysis-result">
                    <h3>🔍 Face Matching Results</h3>
                    <p style="color: #ccc; font-size: 14px; margin-bottom: 15px;">
                      Compared against ${totalCompared} image(s) | 
                      ${matchesFound > 0 ? `<span style="color: #4cd137;">${matchesFound} match(es) found</span>` : '<span style="color: #e74c3c;">No matches</span>'}
                    </p>
                `;
                
                if (data.best_match && data.best_match.match_found) {
                  resultsHTML += `
                    <div style="background: rgba(76, 209, 55, 0.1); padding: 12px; border-radius: 8px; margin-bottom: 15px; border-left: 4px solid #4cd137;">
                      <p style="color: #4cd137; font-weight: bold; margin-bottom: 5px;">✅ Best Match Found!</p>
                      <p style="color: #ccc; font-size: 13px;">Image: <strong>${data.best_match.image}</strong></p>
                      <p style="color: #ccc; font-size: 13px;">Confidence: <strong>${data.best_match.confidence}%</strong> | Distance: ${data.best_match.distance}</p>
                    </div>
                  `;
                }
                
                resultsHTML += '<div style="max-height: 400px; overflow-y: auto;"><h4 style="color: #f2f2f2; font-size: 14px; margin-bottom: 10px;">All Comparisons:</h4>';
                
                data.all_comparisons.forEach((comp, index) => {
                  const matchClass = comp.match_found ? 'success' : 'error';
                  const matchIcon = comp.match_found ? '✅' : '❌';
                  const matchColor = comp.match_found ? '#4cd137' : '#e74c3c';
                  
                  resultsHTML += `
                    <div style="background: rgba(255, 255, 255, 0.05); padding: 10px; border-radius: 6px; margin-bottom: 8px; border-left: 3px solid ${matchColor};">
                      <p style="color: ${matchColor}; font-size: 13px; margin-bottom: 5px;">
                        ${matchIcon} ${comp.match_found ? 'Match' : 'No Match'} - ${comp.image}
                      </p>
                      <p style="color: #ccc; font-size: 12px; margin: 0;">
                        Distance: ${comp.distance !== null ? comp.distance : 'N/A'} | 
                        Confidence: ${comp.confidence}%
                        ${comp.error ? `<br><span style="color: #ffa726;">Error: ${comp.error}</span>` : ''}
                      </p>
                    </div>
                  `;
                });
                
                resultsHTML += '</div></div>';
                resultDiv.innerHTML = resultsHTML;
              } else {
                resultDiv.innerHTML = `<p class="error">⚠️ No comparison results available</p>`;
              }
            } else if (endpoint === '/analyze') {
              if (data.status === 'success' && data.analysis) {
                resultDiv.innerHTML = `
                  <div class="analysis-result">
                    <h3>🤖 AI Analysis Results</h3>
                    <div class="analysis-content">${data.analysis.replace(/\n/g, '<br>')}</div>
                  </div>
                `;
              } else if (data.error) {
                resultDiv.innerHTML = `<p class="error">⚠️ Error: ${data.error}</p>`;
              } else {
                resultDiv.innerHTML = `<p class="error">⚠️ Analysis failed. Please try again.</p>`;
              }
            } else if (endpoint === '/comprehensive') {
              if (data.status === 'success') {
                const faceMatchStatus = data.face_match === true ? 
                  '<span class="success">✅ Match Found</span>' : 
                  '<span class="error">❌ No Match</span>';
                
                const faceMatchError = data.face_match_error ? 
                  `<p style="color: #ffa726; font-size: 12px; margin-top: 5px;">Note: ${data.face_match_error}</p>` : '';
                
                const confidenceInfo = data.face_match_confidence !== undefined ? 
                  `<p style="color: #4cd137; font-size: 12px; margin-top: 5px;">Confidence: ${data.face_match_confidence}% (Distance: ${data.face_match_distance})</p>` : '';
                
                const aiAnalysis = data.ai_analysis ? 
                  `<div class="analysis-content">${data.ai_analysis.replace(/\n/g, '<br>')}</div>` :
                  '<div class="analysis-content">AI analysis unavailable</div>';
                
                resultDiv.innerHTML = `
                  <div class="comprehensive-result">
                    <h3>⚡ Comprehensive Analysis Results</h3>
                    <div class="face-match-result">
                      <h4>Face Matching:</h4>
                      <p>${faceMatchStatus}</p>
                      ${confidenceInfo}
                      ${faceMatchError}
                    </div>
                    <div class="ai-analysis-result">
                      <h4>AI Analysis:</h4>
                      ${aiAnalysis}
                    </div>
                  </div>
                `;
              } else if (data.error) {
                resultDiv.innerHTML = `<p class="error">⚠️ Error: ${data.error}</p>`;
              } else {
                resultDiv.innerHTML = `<p class="error">⚠️ Analysis failed. Please try again.</p>`;
              }
            }
          } catch (error) {
            resultDiv.innerHTML = `<p class="error">⚠️ Network Error: ${error.message}</p>`;
          }
        }, 'image/jpeg');
      }
    });
    </script>

</body>
</html>
